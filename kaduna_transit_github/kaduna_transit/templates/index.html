<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Aisha — Kaduna Transport Assistant</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green:      #25D366;
      --teal:       #075E54;
      --dark-teal:  #054640;
      --bubble-bot: #ffffff;
      --bubble-usr: #DCF8C6;
      --chat-bg:    #E5DDD5;
      --text:       #111B21;
      --muted:      #667781;
      --keke-color: #FF6B35;
      --bus-color:  #1A73E8;
    }

    html, body {
      height: 100%; width: 100%;
      font-family: 'Inter', sans-serif;
      background: #111B21;
      display: flex; align-items: center; justify-content: center;
    }

    .shell {
      width: 100%; max-width: 430px;
      height: 100vh; max-height: 860px;
      display: flex; flex-direction: column;
      background: var(--chat-bg);
      overflow: hidden;
      box-shadow: 0 24px 80px rgba(0,0,0,0.6);
    }

    /* ── Header ─────────────────────────────── */
    .header {
      background: var(--teal);
      padding: 10px 16px;
      display: flex; align-items: center; gap: 12px;
      flex-shrink: 0;
    }
    .h-avatar {
      width: 40px; height: 40px; border-radius: 50%;
      background: var(--green);
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; flex-shrink: 0;
    }
    .h-info { flex: 1; }
    .h-info h2 { color: #fff; font-size: 15px; font-weight: 600; }
    .h-info p  { color: rgba(255,255,255,.72); font-size: 11.5px; margin-top: 1px; }
    .h-icons   { color: #fff; font-size: 18px; display: flex; gap: 16px; }

    /* ── Chat area ──────────────────────────── */
    .chat {
      flex: 1; overflow-y: auto;
      padding: 12px 10px 6px;
      display: flex; flex-direction: column; gap: 4px;
      background-color: #E5DDD5;
      background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%23c8bfb5' fill-opacity='0.28'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/svg%3E");
    }
    .chat::-webkit-scrollbar { width: 0; }

    .date-sep { text-align: center; margin: 6px 0; }
    .date-sep span {
      background: rgba(225,245,254,.9); color: #54656F;
      font-size: 11px; padding: 3px 10px; border-radius: 7px; font-weight: 500;
    }

    /* ── Rows & bubbles ─────────────────────── */
    .row { display: flex; flex-direction: column; max-width: 85%; animation: popIn .2s ease; }
    @keyframes popIn {
      from { opacity:0; transform:scale(.95) translateY(5px); }
      to   { opacity:1; transform:scale(1)   translateY(0); }
    }
    .row.bot  { align-self: flex-start; margin-left: 4px; }
    .row.user { align-self: flex-end;   margin-right: 4px; }

    .bubble {
      padding: 7px 10px 5px;
      border-radius: 8px;
      font-size: 13.5px; line-height: 1.55;
      word-break: break-word; white-space: pre-wrap;
      box-shadow: 0 1px 1px rgba(0,0,0,.1);
      position: relative;
    }
    .bot  .bubble { background: var(--bubble-bot); border-top-left-radius: 0; color: var(--text); }
    .user .bubble { background: var(--bubble-usr); border-top-right-radius: 0; color: var(--text); }

    .bot  .bubble::before { content:''; position:absolute; top:0; left:-8px; border:8px solid transparent; border-top-color:var(--bubble-bot); border-right:none; }
    .user .bubble::before { content:''; position:absolute; top:0; right:-8px; border:8px solid transparent; border-top-color:var(--bubble-usr); border-left:none; }

    .meta { font-size: 10.5px; color: var(--muted); margin-top: 2px; padding: 0 3px; display:flex; gap:3px; }
    .bot  .meta { justify-content: flex-start; }
    .user .meta { justify-content: flex-end; }
    .tick { color: #53BDEB; }

    /* ── Vehicle selection cards ────────────── */
    .route-intro { margin-bottom: 8px; font-weight: 500; }

    .vehicle-cards { display: flex; flex-direction: column; gap: 8px; margin-top: 6px; }

    .v-card {
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 1px 4px rgba(0,0,0,.1);
      cursor: pointer;
      transition: transform .15s, box-shadow .15s;
      border: 2px solid transparent;
    }
    .v-card:hover { transform: translateY(-1px); box-shadow: 0 3px 10px rgba(0,0,0,.15); }
    .v-card:active { transform: scale(.98); }

    .v-card.keke { border-color: var(--keke-color); }
    .v-card.bus  { border-color: var(--bus-color); }

    .v-card-header {
      padding: 8px 12px;
      display: flex; align-items: center; gap: 8px;
      color: #fff; font-weight: 600; font-size: 13.5px;
    }
    .v-card.keke .v-card-header { background: var(--keke-color); }
    .v-card.bus  .v-card-header { background: var(--bus-color); }

    .v-card-header .v-icon { font-size: 20px; }
    .v-card-header .v-name { flex: 1; }
    .v-card-header .v-tag {
      background: rgba(255,255,255,.25);
      padding: 2px 8px; border-radius: 20px;
      font-size: 11px; font-weight: 500;
    }

    .v-card-body { background: #fff; padding: 10px 12px; display: flex; flex-direction: column; gap: 6px; }

    .v-row { display: flex; align-items: flex-start; gap: 8px; }
    .v-row-icon { font-size: 14px; margin-top: 1px; }
    .v-row-content {}
    .v-row-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: .4px; }
    .v-row-value { font-size: 13px; color: var(--text); font-weight: 500; }

    .v-fare { color: var(--teal) !important; font-size: 15px !important; font-weight: 700 !important; }

    .v-select-btn {
      margin-top: 4px;
      width: 100%; padding: 7px;
      border: none; border-radius: 6px;
      font-size: 12.5px; font-weight: 600;
      cursor: pointer; color: #fff;
      transition: opacity .15s;
      font-family: 'Inter', sans-serif;
    }
    .v-select-btn:hover { opacity: .88; }
    .keke .v-select-btn { background: var(--keke-color); }
    .bus  .v-select-btn  { background: var(--bus-color); }

    /* ── Areas list ─────────────────────────── */
    .areas-grid {
      display: flex; flex-wrap: wrap; gap: 6px; margin-top: 6px;
    }
    .area-chip {
      background: #F0F9F4; border: 1.5px solid var(--green);
      color: var(--teal); font-size: 12px; font-weight: 500;
      padding: 4px 10px; border-radius: 20px;
    }

    /* ── Typing ─────────────────────────────── */
    #typing-row {
      display: flex; align-items: flex-start;
      margin-left: 4px; animation: popIn .2s ease;
    }
    .typing-bbl {
      background: #fff; border-radius: 8px; border-top-left-radius: 0;
      padding: 10px 14px; display: flex; gap: 4px; align-items: center;
      box-shadow: 0 1px 1px rgba(0,0,0,.1);
    }
    .t-dot {
      width: 7px; height: 7px; background: #aaa; border-radius: 50%;
      animation: tdot 1.2s infinite;
    }
    .t-dot:nth-child(2) { animation-delay:.15s; }
    .t-dot:nth-child(3) { animation-delay:.3s; }
    @keyframes tdot {
      0%,60%,100% { transform:translateY(0); background:#aaa; }
      30%          { transform:translateY(-4px); background:var(--green); }
    }

    /* ── Quick replies ──────────────────────── */
    #qr { padding: 6px 10px 4px; display: flex; flex-wrap: wrap; gap: 6px; }
    .qr-chip {
      background: #fff; border: 1.5px solid var(--green);
      color: var(--teal); font-size: 12px; font-weight: 500;
      padding: 5px 12px; border-radius: 20px; cursor: pointer;
      transition: all .15s; font-family: 'Inter', sans-serif;
    }
    .qr-chip:hover { background: var(--green); color: #fff; }

    /* ── Input bar ──────────────────────────── */
    .input-bar {
      background: #F0F2F5; padding: 8px;
      display: flex; align-items: flex-end; gap: 8px; flex-shrink: 0;
    }
    .input-wrap {
      flex: 1; background: #fff; border-radius: 24px;
      display: flex; align-items: flex-end; padding: 6px 12px 6px 16px; gap: 6px;
    }
    #msg {
      flex: 1; border: none; outline: none;
      font-size: 14px; font-family: 'Inter', sans-serif;
      color: var(--text); background: transparent;
      resize: none; max-height: 100px; line-height: 1.5; padding: 3px 0;
    }
    #msg::placeholder { color: #aaa; }
    #send {
      width: 46px; height: 46px; border-radius: 50%;
      background: var(--green); border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
      transition: background .15s, transform .1s;
      box-shadow: 0 2px 8px rgba(37,211,102,.4);
    }
    #send:hover  { background: #1db954; }
    #send:active { transform: scale(.93); }
    #send svg { width: 20px; height: 20px; fill: #fff; }
  </style>
</head>
<body>
<div class="shell">

  <div class="header">
    <div class="h-avatar">🚌</div>
    <div class="h-info">
      <h2>Aisha</h2>
      <p>🟢 Online · Kaduna City Transport</p>
    </div>
    <div class="h-icons"><span>📞</span><span>⋮</span></div>
  </div>

  <div class="chat" id="chat">
    <div class="date-sep"><span>TODAY</span></div>
  </div>

  <div id="qr">
    <button class="qr-chip" onclick="qs(this)">Sabon Tasha → Barnawa</button>
    <button class="qr-chip" onclick="qs(this)">Kawo → Kaduna Central</button>
    <button class="qr-chip" onclick="qs(this)">Barnawa → Kawo</button>
    <button class="qr-chip" onclick="qs(this)">List areas</button>
    <button class="qr-chip" onclick="qs(this)">Help</button>
  </div>

  <div class="input-bar">
    <div class="input-wrap">
      <span style="color:#aaa;font-size:20px;padding-bottom:3px;cursor:pointer;">😊</span>
      <textarea id="msg" rows="1" placeholder="Type a message…"></textarea>
    </div>
    <button id="send" onclick="send()">
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>
</div>

<script>
  const chat = document.getElementById("chat");
  const msgEl = document.getElementById("msg");

  function ts() {
    const d = new Date();
    return String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
  }

  msgEl.addEventListener("input", () => {
    msgEl.style.height = "auto";
    msgEl.style.height = Math.min(msgEl.scrollHeight, 100) + "px";
  });
  msgEl.addEventListener("keydown", e => {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); }
  });

  function qs(btn) {
    msgEl.value = btn.textContent.replace('→','to');
    send();
  }

  function scrollBot() { chat.scrollTop = chat.scrollHeight; }

  // ── Plain text bubble ──────────────────────
  function addBubble(text, role) {
    const row    = document.createElement("div");
    row.className = `row ${role}`;
    const bbl    = document.createElement("div");
    bbl.className = "bubble";
    bbl.textContent = text;
    const meta   = document.createElement("div");
    meta.className = "meta";
    meta.innerHTML = role === "user"
      ? `${ts()} <span class="tick">✓✓</span>`
      : ts();
    row.appendChild(bbl); row.appendChild(meta);
    chat.appendChild(row); scrollBot();
  }

  // ── Bot response router ────────────────────
  function addBotMsg(text) {
    if (text.startsWith("MULTI_ROUTE:")) {
      renderVehicleCards(text);
    } else if (text.startsWith("list_areas:")) {
      renderAreasList(text);
    } else {
      addBubble(text, "bot");
    }
  }

  // ── Vehicle selection cards ────────────────
  function renderVehicleCards(text) {
    // Format: MULTI_ROUTE:origin:destination:v1|fare|dur|notes||v2|fare|dur|notes
    const parts   = text.split(":");
    const origin  = parts[1];
    const dest    = parts[2];
    const options = parts[3].split("||").map(o => {
      const [vehicle, fare, duration, notes] = o.split("|");
      return { vehicle, fare, duration, notes };
    });

    const row    = document.createElement("div");
    row.className = "row bot";

    const bbl    = document.createElement("div");
    bbl.className = "bubble";

    const intro  = document.createElement("div");
    intro.className = "route-intro";
    intro.textContent = `✅ Route found! Choose your preferred vehicle:`;
    bbl.appendChild(intro);

    // From → To line
    const routeLine = document.createElement("div");
    routeLine.style.cssText = "font-size:13px;color:#555;margin-bottom:6px;";
    routeLine.textContent = `📍 ${cap(origin)}  →  🏁 ${cap(dest)}`;
    bbl.appendChild(routeLine);

    const cards  = document.createElement("div");
    cards.className = "vehicle-cards";

    options.forEach(opt => {
      const isKeke = opt.vehicle.toLowerCase().includes("keke");
      const cls    = isKeke ? "keke" : "bus";
      const icon   = isKeke ? "🛺" : "🚌";
      const tag    = isKeke ? "Faster" : "Budget";

      const card   = document.createElement("div");
      card.className = `v-card ${cls}`;
      card.innerHTML = `
        <div class="v-card-header">
          <span class="v-icon">${icon}</span>
          <span class="v-name">${opt.vehicle}</span>
          <span class="v-tag">${tag}</span>
        </div>
        <div class="v-card-body">
          <div class="v-row">
            <span class="v-row-icon">💰</span>
            <div class="v-row-content">
              <div class="v-row-label">Estimated Fare</div>
              <div class="v-row-value v-fare">${opt.fare}</div>
            </div>
          </div>
          <div class="v-row">
            <span class="v-row-icon">⏱️</span>
            <div class="v-row-content">
              <div class="v-row-label">Travel Time</div>
              <div class="v-row-value">${opt.duration}</div>
            </div>
          </div>
          <div class="v-row">
            <span class="v-row-icon">ℹ️</span>
            <div class="v-row-content">
              <div class="v-row-label">Directions</div>
              <div class="v-row-value" style="font-weight:400;color:#444;">${opt.notes}</div>
            </div>
          </div>
          <button class="v-select-btn" onclick="selectVehicle('${opt.vehicle}', '${cap(origin)}', '${cap(dest)}', '${opt.fare}')">
            ${icon} Select ${opt.vehicle}
          </button>
        </div>
      `;
      cards.appendChild(card);
    });

    bbl.appendChild(cards);

    const meta   = document.createElement("div");
    meta.className = "meta";
    meta.textContent = ts();

    row.appendChild(bbl); row.appendChild(meta);
    chat.appendChild(row); scrollBot();
  }

  // ── When user taps a vehicle card ─────────
  function selectVehicle(vehicle, origin, dest, fare) {
    const isKeke = vehicle.toLowerCase().includes("keke");
    const icon   = isKeke ? "🛺" : "🚌";
    addBubble(`${icon} ${vehicle} — ${origin} to ${dest}`, "user");
    setTimeout(() => {
      addBubble(
        `Great choice! 👍\n\n${icon} You selected: ${vehicle}\n📍 ${origin} → ${dest}\n💰 Fare: ${fare}\n\nBoard safely and have a smooth journey! 🙏`,
        "bot"
      );
    }, 600);
  }

  // ── Areas list ─────────────────────────────
  function renderAreasList(text) {
    const areas  = text.replace("list_areas:", "").split(",");
    const row    = document.createElement("div");
    row.className = "row bot";
    const bbl    = document.createElement("div");
    bbl.className = "bubble";

    const title  = document.createElement("div");
    title.style.cssText = "font-weight:600;margin-bottom:8px;";
    title.textContent   = "📍 Available areas in our database:";
    bbl.appendChild(title);

    const grid   = document.createElement("div");
    grid.className = "areas-grid";
    areas.forEach(a => {
      const chip   = document.createElement("span");
      chip.className = "area-chip";
      chip.textContent = a.trim();
      grid.appendChild(chip);
    });
    bbl.appendChild(grid);

    const meta   = document.createElement("div");
    meta.className = "meta";
    meta.textContent = ts();
    row.appendChild(bbl); row.appendChild(meta);
    chat.appendChild(row); scrollBot();
  }

  function cap(s) {
    return s.split(' ').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ');
  }

  // ── Typing indicator ───────────────────────
  function showTyping() {
    const wrap   = document.createElement("div");
    wrap.id      = "typing-row";
    const b      = document.createElement("div");
    b.className  = "typing-bbl";
    b.innerHTML  = '<div class="t-dot"></div><div class="t-dot"></div><div class="t-dot"></div>';
    wrap.appendChild(b); chat.appendChild(wrap); scrollBot();
  }
  function hideTyping() {
    const el     = document.getElementById("typing-row");
    if (el) el.remove();
  }

  // ── Send ───────────────────────────────────
  async function send() {
    const text   = msgEl.value.trim();
    if (!text) return;
    document.getElementById("qr").style.display = "none";
    addBubble(text, "user");
    msgEl.value  = ""; msgEl.style.height = "auto";
    showTyping();
    try {
      const res  = await fetch("/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message: text })
      });
      const data = await res.json();
      hideTyping();
      addBotMsg(data.reply);
    } catch {
      hideTyping();
      addBotMsg("⚠️ Connection error. Make sure the server is running.");
    }
  }

  // ── Welcome ────────────────────────────────
  window.addEventListener("DOMContentLoaded", () => {
    setTimeout(() => {
      addBotMsg(
        "👋 Hi! I'm Aisha — your Kaduna public transport assistant.\n\n" +
        "Tell me where you're going and I'll show you both Keke 🛺 and Bus 🚌 options with different fares so you can choose!\n\n" +
        "Example: \"I want to go from Sabon Tasha to Barnawa\""
      );
    }, 400);
  });
</script>
</body>
</html>
